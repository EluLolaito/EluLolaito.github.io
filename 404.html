<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/style.css"> <!-- Link to the main CSS file -->
    <link rel="icon" href="../images/logos/logo_white.svg" type="image/svg+xml">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--background-color);
            color: var(--text-color);
            text-align: center;

            margin: 20px;
        }

            font-size: 5em;
            margin-bottom: 20px;

            text-decoration: none;
            border: 1px solid var(--link-color);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 1.2em;
        }

        a:hover {
            background-color: var(--link-color);
            color: #fff;
        }
