<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyMusic - Projects</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Projects</h1>
            <p>Check out my open-source projects on GitHub!</p>
        </div>
    </header>

    <main class="container">
        <section class="projects-grid">
            <div class="project">
                <h2><a href="https://github.com/elulolaito/project1" target="_blank">Project 1</a></h2>
                <p>Project 1 description goes here...</p>
            </div>
            <div class="project">
                <h2><a href="https://github.com/elulolaito/project2" target="_blank">Project 2</a></h2>
                <p>Project 2 description goes here...</p>
            </div>
            <div class="project">
                <h2><a href="https://github.com/elulolaito/project3" target="_blank">Project 3</a></h2>
                <p>Project 3 description goes here...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 SkyMusic. All rights reserved.</p>
    </footer>

    <style>
        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .project {
            border: 2px solid var(--link_color);
            border-radius: 10px;
            padding: 20px;
            background-color: var(--background_color_default);
            transition: border-color 0.3s ease;
        }

        .project:hover {
            border-color: var(--link_hover_color);
        }

        .project h2 a {
            color: var(--link_color);
            text-decoration: none;
        }

        .project h2 a:hover {
            color: var(--link_hover_color);
        }

        @media (max-width: 768px) {
            .project {
                font-size: 16px;
            }
        }
    </style>
</body>
</html>
